<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Leads Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { background-color: #0b0f1a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #2dd4bf); background-clip: text; -webkit-text-fill-color: transparent; }
        .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter, .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_paginate { color: #94a3b8 !important; }
        table.dataTable tbody tr { background-color: transparent !important; color: #e2e8f0 !important; border-bottom: 1px solid #1e293b !important; }
        table.dataTable thead th { background-color: #1e293b !important; color: #94a3b8 !important; text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em; }
        .star-gold { color: #fbbf24; }
        .star-gray { color: #2d3748; }
        .btn-trash:hover { color: #ef4444; transform: scale(1.2); transition: all 0.2s; }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black gradient-text tracking-tighter">BUSCA LEADS</h1>
                <p class="text-slate-500 text-sm font-medium">Extração Inteligente & Validação</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-900 border border-slate-800 text-slate-400 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition-all">
                PESQUISAR NOVAMENTE
            </button>
        </header>

        <div class="glass-card p-8 rounded-3xl mb-10">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-end">
                <div class="md:col-span-7">
                    <label class="block text-[10px] font-bold text-slate-400 mb-3 uppercase tracking-widest">Atividade e Localização</label>
                    <input type="text" id="searchInput" placeholder="Ex: Contabilidade em São Paulo" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white outline-none">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-bold text-slate-400 mb-3 uppercase tracking-widest">Quantidade</label>
                    <select id="limitSelect" class="w-full bg-slate-950 border border-slate-800 rounded-2xl p-4 text-white outline-none">
                        <option value="10">10</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
                <div class="md:col-span-3">
                    <button id="btnBuscar" onclick="buscarLeads()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-extrabold py-4 rounded-2xl transition-all shadow-lg active:scale-95">
                        INICIAR CONSULTA
                    </button>
                </div>
            </div>

            <div id="progressWrapper" class="hidden mt-10">
                <div class="flex justify-between items-end mb-3">
                    <span id="progressStatus" class="text-blue-400 text-[10px] font-bold uppercase">Processando no Servidor...</span>
                    <span id="progressPercent" class="text-2xl font-black text-white">0%</span>
                </div>
                <div class="w-full bg-slate-950 rounded-full h-3 p-1 border border-slate-800">
                    <div id="progressBar" class="bg-blue-500 h-full rounded-full w-0 transition-all duration-500"></div>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-3xl overflow-hidden hidden" id="tabelaContainer">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/30">
                <h2 class="font-bold text-slate-200">Leads Encontrados</h2>
                <button onclick="exportarExcel()" class="bg-emerald-600 hover:bg-emerald-500 text-white py-2.5 px-6 rounded-xl text-xs font-bold transition-all">
                    EXPORTAR EXCEL
                </button>
            </div>
            <div class="p-6">
                <table id="tabelaLeads" class="display w-full">
                    <thead>
                        <tr>
                            <th>Qualidade</th>
                            <th>Empresa</th>
                            <th>WhatsApp</th>
                            <th>Site</th>
                            <th>UF</th>
                            <th>E-mail</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let table = $('#tabelaLeads').DataTable({
            language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json' },
            order: [[0, 'desc']]
        });
        let leadsAtuais = [];

        async function buscarLeads() {
            const query = document.getElementById('searchInput').value;
            const limit = parseInt(document.getElementById('limitSelect').value);
            if(!query) return alert("Digite o que deseja buscar!");

            const btn = document.getElementById('btnBuscar');
            const wrapper = document.getElementById('progressWrapper');
            const bar = document.getElementById('progressBar');
            const percent = document.getElementById('progressPercent');

            btn.disabled = true;
            btn.innerText = "CAPTURANDO...";
            wrapper.classList.remove('hidden');
            bar.style.width = "30%";
            percent.innerText = "30%";

            try {
                const response = await fetch('https://busca-lead.onrender.com/buscar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, limit: limit })
                });

                const data = await response.json();

                if (response.ok && Array.isArray(data)) {
                    leadsAtuais = data;
                    bar.style.width = "100%";
                    percent.innerText = "100%";
                    renderizarTabela();
                    $('#tabelaContainer').removeClass('hidden');
                } else {
                    alert("Erro: " + (data.erro || "Falha no servidor"));
                }
            } catch (err) {
                alert("Erro ao conectar com a API do Render.");
            } finally {
                btn.disabled = false;
                btn.innerText = "INICIAR CONSULTA";
                setTimeout(() => wrapper.classList.add('hidden'), 1000);
            }
        }

        function renderizarTabela() {
            table.clear();
            leadsAtuais.forEach((lead, index) => {
                let stars = `<div class="flex gap-0.5">`;
                for(let i=1; i<=3; i++) {
                    stars += `<span class="${i <= lead.score ? 'star-gold' : 'star-gray'}">★</span>`;
                }
                stars += `</div>`;

                const cleanTel = lead.telefone.replace(/\D/g, '');
                const zap = lead.telefone !== "N/A" ? `<a href="https://wa.me/55${cleanTel}" target="_blank" class="text-emerald-400 underline">${lead.telefone}</a>` : "N/A";
                const site = lead.site ? `<a href="${lead.site}" target="_blank" class="text-blue-400">Visitar</a>` : "N/A";

                table.row.add([
                    stars,
                    `<span class="text-white font-bold">${lead.nome}</span>`,
                    zap,
                    site,
                    lead.estado || "N/A",
                    lead.email || "N/A",
                    `<button onclick="removerLead(${index})" class="btn-trash text-red-500">Excluir</button>`
                ]);
            });
            table.draw();
        }

        function removerLead(i) {
            leadsAtuais.splice(i, 1);
            renderizarTabela();
        }

        function exportarExcel() {
            const ws = XLSX.utils.json_to_sheet(leadsAtuais);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Leads");
            XLSX.writeFile(wb, "Leads_Extraidos.xlsx");
        }
    </script>
</body>
</html>
