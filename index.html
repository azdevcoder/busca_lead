<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Busca Leads Híbrido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #0b0f1a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(10px); border: 1px solid #1e293b; border-radius: 20px; }
        .star-gold { color: #fbbf24; }
        table.dataTable tbody tr { background: transparent !important; color: #cbd5e1 !important; border-bottom: 1px solid #1e293b !important; }
    </style>
</head>
<body class="p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-white italic">LEAD<span class="text-blue-500">PRO</span> HÍBRIDO</h1>
            <button onclick="location.reload()" class="text-xs text-slate-500 hover:text-white uppercase font-bold">Reiniciar Sistema</button>
        </header>

        <div class="glass-card p-8 mb-8">
            <div class="flex flex-col md:flex-row gap-4 items-end">
                <div class="flex-1">
                    <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Busca no Google Maps</label>
                    <input type="text" id="searchInput" placeholder="O que você procura?" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white outline-none focus:border-blue-500">
                </div>
                <div class="w-32">
                    <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Qtd</label>
                    <select id="limitSelect" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white">
                        <option value="10">10</option>
                        <option value="50">50</option>
                    </select>
                </div>
                <button id="btnBuscar" onclick="buscar()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-10 py-4 rounded-xl transition-all">
                    INICIAR BUSCA
                </button>
            </div>

            <div id="statusArea" class="hidden mt-6">
                <div class="w-full bg-slate-900 h-1 rounded-full overflow-hidden">
                    <div id="progBar" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
                </div>
                <p id="statusMsg" class="text-[10px] text-blue-400 mt-2 font-bold uppercase tracking-widest">Aguardando comando...</p>
            </div>
        </div>

        <div id="containerTabela" class="glass-card hidden overflow-hidden">
            <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                <h2 class="font-bold text-sm uppercase tracking-tighter text-slate-300">Leads Encontrados e Enriquecidos</h2>
                <button onclick="exportar()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold text-xs">EXPORTAR EXCEL</button>
            </div>
            <div class="p-6">
                <table id="tabela" class="w-full">
                    <thead>
                        <tr class="text-left text-slate-500 text-[10px] uppercase">
                            <th>Qualidade</th>
                            <th>Empresa</th>
                            <th>WhatsApp</th>
                            <th>UF</th>
                            <th>E-mail (API)</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let dt = $('#tabela').DataTable({ language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json' } });
        let leads = [];

        async function buscar() {
            const query = $('#searchInput').val();
            if(!query) return;

            $('#btnBuscar').prop('disabled', true).text("CAPTURANDO...");
            $('#statusArea').removeClass('hidden');
            $('#statusMsg').text("Abrindo Maps e consultando APIs...");
            $('#progBar').css('width', '40%');

            try {
                const res = await fetch('http://127.0.0.1:8000/buscar', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ query, limit: parseInt($('#limitSelect').val()) })
                });
                leads = await res.json();
                
                $('#progBar').css('width', '100%');
                render(leads);
                $('#containerTabela').removeClass('hidden');
            } catch(e) { alert("Erro ao processar!"); }

            $('#btnBuscar').prop('disabled', false).text("INICIAR BUSCA");
        }

        function render(data) {
            dt.clear();
            data.forEach(l => {
                const zap = l.telefone !== "N/A" ? `<a href="https://wa.me/55${l.telefone.replace(/\D/g,'')}" target="_blank" class="text-emerald-400 font-bold underline">${l.telefone}</a>` : "N/A";
                dt.row.add([
                    `<span class="star-gold">${"★".repeat(l.score)}</span>`,
                    `<span class="font-bold text-white">${l.nome}</span>`,
                    zap,
                    `<span class="text-xs uppercase font-bold text-slate-500">${l.estado}</span>`,
                    `<span class="text-blue-400 text-xs">${l.email}</span>`
                ]);
            });
            dt.draw();
        }

        function exportar() {
            const ws = XLSX.utils.json_to_sheet(leads);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Leads");
            XLSX.writeFile(wb, "leads_pro.xlsx");
        }
    </script>
</body>
</html>
